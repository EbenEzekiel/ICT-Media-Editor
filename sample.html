<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Media Editor UI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    height: 100vh;
    background: #121212;
    color: #fff;
}

/* Sidebar */
.sidebar {
    width: 200px;
    background: #1e1e1e;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.sidebar button {
    padding: 10px;
    border: none;
    background: #2a2a2a;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

.sidebar button.active {
    background: #4CAF50;
}

/* Main Area */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Top Bar */
.topbar {
    background: #1e1e1e;
    padding: 10px;
    display: flex;
    justify-content: space-between;
}

.upload-btn {
    background: #4CAF50;
    border: none;
    padding: 8px 15px;
    cursor: pointer;
    border-radius: 5px;
}

/* Editor Area */
.editor {
    flex: 1;
    display: flex;
}

/* Preview */
.preview {
    flex: 2;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
}

.preview video,
.preview img,
.preview audio {
    max-width: 100%;
    max-height: 100%;
}

/* Tools Panel */
.tools {
    width: 250px;
    background: #1e1e1e;
    padding: 15px;
}

.tools h3 {
    margin-bottom: 10px;
}

.tools button {
    width: 100%;
    margin-bottom: 10px;
    padding: 8px;
    background: #2a2a2a;
    border: none;
    color: white;
    cursor: pointer;
}

/* Timeline */
.timeline {
    height: 120px;
    background: #181818;
    padding: 10px;
}

.timeline-bar {
    height: 40px;
    background: #333;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="sidebar">
    <button class="tab active" onclick="switchMode('video')">Video</button>
    <button class="tab" onclick="switchMode('image')">Image</button>
    <button class="tab" onclick="switchMode('audio')">Audio</button>
</div>

<div class="main">
    
    <div class="topbar">
        <h2>Media Editor</h2>
        <input type="file" id="fileInput" hidden>
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Upload</button>
    </div>

    <div class="editor">
        
        <div class="preview" id="preview">
            <p>No media loaded</p>
        </div>

        <div class="tools" id="tools">
            <h3>Tools</h3>
            <button>Trim</button>
            <button>Crop</button>
            <button>Resize</button>
            <button>Filters</button>
            <button>Volume</button>
        </div>

    </div>

    <div class="timeline">
        <div class="timeline-bar"></div>
    </div>

</div>

<script>
let currentMode = "video";

function switchMode(mode) {
    currentMode = mode;

    document.querySelectorAll(".tab").forEach(btn => btn.classList.remove("active"));
    event.target.classList.add("active");

    document.getElementById("preview").innerHTML = `<p>No ${mode} loaded</p>`;
}

document.getElementById("fileInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const url = URL.createObjectURL(file);
    const preview = document.getElementById("preview");

    if (file.type.startsWith("video")) {
        preview.innerHTML = `<video controls src="${url}"></video>`;
    } else if (file.type.startsWith("image")) {
        preview.innerHTML = `<img src="${url}" />`;
    } else if (file.type.startsWith("audio")) {
        preview.innerHTML = `<audio controls src="${url}"></audio>`;
    } else {
        preview.innerHTML = `<p>Unsupported file</p>`;
    }
});
</script>

</body>
</html>
